services:
  redirector:
    build: .
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY}
      - PORT=${PORT}
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redirector.rule=${DOMAIN_RULE}"
      - "traefik.http.routers.redirector.entrypoints=websecure"
      - "traefik.http.routers.redirector.tls.certresolver=letsencrypt"
      - "traefik.http.services.redirector.loadbalancer.server.port=${PORT}"

networks:
  traefik-net:
    external: true
